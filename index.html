<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Torneo Suizo PES6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>🏆 Torneo Suizo PES6</h1>

  <section id="setup">
    <h2>Jugadores</h2>
    <textarea id="playersInput" placeholder="Un jugador por línea"></textarea>
    <button onclick="crearTorneo()">Crear torneo</button>
  </section>

  <section id="rounds">
    <h2>Rondas</h2>
    <div id="matches"></div>
    <button onclick="generarRonda()">Siguiente ronda</button>
  </section>

  <section id="tabla">
    <h2>Clasificación</h2>
    <div id="standings"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
